{% set name = "itemloaders" %}
{% set version = "1.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b5338308a819098f43525b7afc5f7d46ba338ba4710f5ebe7a21b3b47bb29929

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true # [py<38]

requirements:
  host:
    - pip
    - python
    - hatchling >=1.27.0
  run:
    - python
    - itemadapter >=0.1.0
    - jmespath >=0.9.5
    - parsel >=1.5.0

test:
  source_files:
    - tests
  imports:
    - itemloaders
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest tests

about:
  home: https://github.com/scrapy/itemloaders
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Collect data from HTML and XML sources
  description: |
    Library that helps you collect data from HTML and XML sources.
  dev_url: https://github.com/scrapy/itemloaders
  doc_url: https://itemloaders.readthedocs.io

extra:
  recipe-maintainers:
    - Gallaecio
    - wRAR
    - dangra
    - rmax
